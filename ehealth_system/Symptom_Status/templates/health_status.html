<h1>Health Status Monitoring</h1>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Resident Type</th>
        <th>Status</th>
        <th>Action</th>  <!-- New column for Edit button -->
    </tr>
    {% for status in statuses %}
    <tr>
        <td>{{ status.resident.resident_id }}</td>
        <td>{{ status.resident.name }}</td>
        <td>{{ status.resident.resident_type }}</td>
        <td>{{ status.status }}</td>
        <td>
            <!-- Edit button with a link to the edit page -->
            <a href="{% url 'edit_resident' status.resident.id %}">
                <button>Edit</button>
            </a>
            <a href="{% url 'delete_resident' status.resident.id %}" onclick="return confirm('Are you sure you want to delete this resident?');">
                <button style="background-color: red; color: white;">Delete</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
