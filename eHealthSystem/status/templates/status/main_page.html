<!DOCTYPE html>
<html>
<head>
    <title>Infected Status</title>
</head>
<body>
    <h1>Infected Status</h1>
    <p>Total Infected Students: {{ infected_students }}</p>
    <p>Total Infected Lecturers: {{ infected_lecturers }}</p>

    <h2>Hotspot places in MMU</h2>
    {% if hotplaces %}
        <ul>
            {% for hotplace in hotplaces %}
                <li>{{ hotplace.name }}</li>  
            {% endfor %}
        </ul>
    {% else %}
        <p>No hotplaces available.</p>
    {% endif %}

    <button onclick="window.location.href='{% url 'view_infected_students' %}'">View Infected Students</button>
    <button onclick="window.location.href='{% url 'view_infected_lecturers' %}'">View Infected Lecturers</button>
    <button onclick="window.location.href='{% url 'view_hotplaces' %}'">View Hotplaces</button>
</body>
</html>
